<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestones - FlowBit</title>
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/milestones.css">
    <link rel="stylesheet" href="../../assets/css/goals.css">
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <div class="logo-icon">≋</div>
            <span>FlowBit</span>
        </div>

        <nav class="nav-menu">
            <a href="../dashboard/dashboard.html" class="nav-item">
                <span class="icon">▦</span>
                <span>Dashboard</span>
            </a>
            <a href="../goals/goals.html" class="nav-item">
                <span class="icon">⚑</span>
                <span>Goals</span>
            </a>
            <a href="../milestones/milestones.html" class="nav-item active">
                <span class="icon">◉</span>
                <span>Milestones</span>
            </a>
            <a href="../tasks/tasks.html" class="nav-item">
                <span class="icon">☰</span>
                <span>Tasks</span>
            </a>
            <a href="../risk-engine/risk-engine.html" class="nav-item">
                <span class="icon">⚠</span>
                <span>Risk Engine</span>
            </a>
            <a href="../insights/insights.html" class="nav-item">
                <span class="icon">◐</span>
                <span>Insights</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatarSmall">JD</div>
                <div class="user-info">
                    <div class="user-name-small" id="userNameSmall">John Doe</div>
                    <div class="user-role">Project Manager</div>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">
                <span class="icon">→</span>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-actions">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Search..." id="searchInput">
                </div>
                <div class="notification-bell">
                    🔔
                    <span class="badge">3</span>
                </div>
                <button class="theme-toggle">⚙️</button>
                <div class="user-avatar" id="userAvatar">JD</div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            <!-- Page Header -->
            <div class="page-header">
                <div class="page-title">
                    <h1>Milestones</h1>
                </div>
                <div class="page-actions">
                    <button class="btn-primary" onclick="openAddMilestoneModal()">+ New Milestone</button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters-row">
                <select class="filter-select" id="scopeFilter" onchange="filterMilestones()">
                    <option value="all">All Milestones</option>
                    <option value="my">My Milestones</option>
                </select>
                <select class="filter-select" id="goalFilter" onchange="filterMilestones()">
                    <option value="all">All Goals</option>
                    <!-- Goals will be loaded dynamically -->
                </select>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading-state" style="display: flex;">
                <div class="spinner"></div>
                <p>Loading milestones...</p>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📋</div>
                <h3>No milestones yet</h3>
                <p>Create your first milestone to track progress towards your goals.</p>
                <button class="btn-primary" onclick="openAddMilestoneModal()">
                    <span class="icon">+</span>
                    Create Milestone
                </button>
            </div>

            <!-- Milestones Container -->
            <div id="milestonesContainer" class="milestones-container" style="display: none;">
                <!-- Milestones will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Milestone Modal -->
    <div id="milestoneModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Milestone</h2>
                <button class="modal-close" onclick="closeMilestoneModal()">&times;</button>
            </div>
            <form id="milestoneForm" onsubmit="handleMilestoneSubmit(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="milestoneTitle">Title <span class="required">*</span></label>
                        <input type="text" id="milestoneTitle" name="title" required maxlength="200">
                    </div>

                    <div class="form-group">
                        <label for="milestoneDescription">Description</label>
                        <textarea id="milestoneDescription" name="description" rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="milestoneGoal">Goal <span class="required">*</span></label>
                        <select id="milestoneGoal" name="goal_id" required>
                            <option value="">Select a goal...</option>
                            <!-- Goals will be loaded dynamically -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="milestoneOwner">Owner <span class="required">*</span></label>
                        <select id="milestoneOwner" name="owner" required>
                            <option value="">Select an owner...</option>
                            <!-- Owners will be loaded dynamically -->
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="milestoneDueDate">Due Date <span class="required">*</span></label>
                            <input type="date" id="milestoneDueDate" name="due_date" required>
                        </div>
                        <div class="form-group">
                            <label for="milestoneStatus">Status</label>
                            <select id="milestoneStatus" name="status">
                                <option value="PENDING" selected>Pending</option>
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="BLOCKED">Blocked</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="milestoneProgress">Progress (%)</label>
                        <input type="number" id="milestoneProgress" name="progress" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-secondary" onclick="closeMilestoneModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <span id="submitBtnText">Create Milestone</span>
                        <span id="submitBtnLoader" class="btn-loader" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">

        import { SupabaseClient } from '../../assets/js/config/supabase-client.js';

        const supabase = new SupabaseClient();
        let currentUser = null;
        let allMilestones = [];
        let allGoals = [];
        let teamMembers = [];
        let currentMilestoneId = null;

        // Check authentication
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                currentUser = await supabase.getCurrentUser();
                if (!currentUser) {
                    window.location.href = '../auth/login.html';
                    return;
                }

                // Update UI with user info
                document.getElementById('userNameSmall').textContent = currentUser.email;
                document.getElementById('userAvatarSmall').textContent = currentUser.email.charAt(0).toUpperCase();
                document.getElementById('userAvatar').textContent = currentUser.email.charAt(0).toUpperCase();

                // Load data in sequence to ensure dependencies
                await loadTeamMembers();
                await loadGoals();
                // Wait for goals to load before loading milestones
                await loadMilestones();

                console.log('✅ Milestones page loaded successfully!');
                console.log('📊 Final state - Goals:', allGoals.length, 'Milestones:', allMilestones.length);
            } catch (error) {
                console.error('Error initializing page:', error);
                showToast('Failed to load page', 'error');
            }
        });

        // Load Team Members for Owner Dropdown
        async function loadTeamMembers() {
            try {
                const result = await supabase.getAllTeamMembers();

                // Ensure result is an array
                if (Array.isArray(result)) {
                    teamMembers = result;
                } else {
                    console.warn('Team members result is not an array:', result);
                    teamMembers = [];
                }

                console.log('✅ Loaded team members:', teamMembers.length);

                // Always add current user if not already in list
                const currentUserExists = teamMembers.some(m => m.email === currentUser.email);
                if (!currentUserExists && currentUser) {
                    teamMembers.push({
                        id: currentUser.id,
                        email: currentUser.email,
                        display_name: currentUser.email.split('@')[0]
                    });
                }

                populateOwnerDropdown();
            } catch (error) {
                console.error('Error loading team members:', error);
                showToast('Failed to load team members. Using current user only.', 'warning');
                // If loading fails, add at least current user
                teamMembers = [{
                    id: currentUser.id,
                    email: currentUser.email,
                    display_name: currentUser.email.split('@')[0]
                }];
                populateOwnerDropdown();
            }
        }

        function populateOwnerDropdown(selectedOwner = null) {
            const ownerSelect = document.getElementById('milestoneOwner');

            // Clear existing options except the first one
            ownerSelect.innerHTML = '<option value="">Select owner...</option>';

            // Add team members as options
            teamMembers.forEach(member => {
                const option = document.createElement('option');
                // Use display_name, full_name, or email as fallback
                const displayName = member.display_name || member.full_name || member.email.split('@')[0];
                option.value = displayName;
                option.textContent = displayName;

                // Pre-select current user or specified owner
                if (selectedOwner) {
                    if (displayName === selectedOwner) {
                        option.selected = true;
                    }
                } else if (member.email === currentUser.email) {
                    option.selected = true;
                }

                ownerSelect.appendChild(option);
            });

            console.log('✅ Owner dropdown populated with', teamMembers.length, 'users');
        }

        // Load Goals for Filter and Modal
        async function loadGoals() {
            try {
                const goals = await supabase.select('goals');
                allGoals = goals || [];
                console.log('✅ Loaded goals:', allGoals.length, allGoals);

                // Populate goal filters
                const goalFilter = document.getElementById('goalFilter');
                const milestoneGoalSelect = document.getElementById('milestoneGoal');

                // Clear existing options (except "All Goals" / "Select a goal")
                goalFilter.innerHTML = '<option value="all">All Goals</option>';
                milestoneGoalSelect.innerHTML = '<option value="">Select a goal...</option>';

                if (allGoals && allGoals.length > 0) {
                    allGoals.forEach(goal => {
                        // Filter dropdown
                        const filterOption = document.createElement('option');
                        filterOption.value = goal.id;
                        filterOption.textContent = goal.title;
                        goalFilter.appendChild(filterOption);

                        // Modal dropdown
                        const modalOption = document.createElement('option');
                        modalOption.value = goal.id;
                        modalOption.textContent = goal.title;
                        milestoneGoalSelect.appendChild(modalOption);
                    });
                }
            } catch (error) {
                console.error('Error loading goals:', error);
                showToast('Failed to load goals', 'error');
            }
        }

        // Load Milestones
        async function loadMilestones() {
            try {
                showLoading(true);

                // Ensure goals are loaded first
                if (allGoals.length === 0) {
                    console.warn('⚠️ Goals not loaded yet, loading now...');
                    await loadGoals();
                }

                const milestones = await supabase.select('milestones', null, { order: 'due_date.asc' });
                console.log('✅ Loaded milestones from DB:', milestones?.length || 0);

                allMilestones = milestones || [];

                console.log('📊 All milestones stored:', allMilestones.length);
                console.log('📁 Goals available:', allGoals.length);
                console.log('👥 Team members available:', teamMembers.length);

                if (allMilestones.length === 0) {
                    console.log('⚠️ No milestones found, showing empty state');
                    showEmptyState();
                } else {
                    console.log('🔍 Calling filterMilestones() to render...');
                    filterMilestones();
                    console.log('✅ filterMilestones() completed');
                }
            } catch (error) {
                console.error('❌ Error loading milestones:', error);
                showToast('Failed to load milestones', 'error');
                showEmptyState();
            } finally {
                showLoading(false);
            }
        }

        // Filter Milestones
        window.filterMilestones = function () {
            console.log('🔍 filterMilestones() called');
            console.log('   allMilestones:', allMilestones.length);
            console.log('   allGoals:', allGoals.length);
            console.log('   teamMembers:', teamMembers.length);

            const scopeFilter = document.getElementById('scopeFilter').value;
            const goalFilter = document.getElementById('goalFilter').value;

            console.log('   scopeFilter:', scopeFilter);
            console.log('   goalFilter:', goalFilter);

            let filtered = [...allMilestones]; // Create a copy

            // Apply scope filter based on owner field
            if (scopeFilter === 'my') {
                // Get current user's display name
                const currentUserDisplayName = currentUser.email.split('@')[0];

                // Find current user in team members to get their display name
                const currentUserMember = teamMembers.find(m => m.email === currentUser.email);
                const userDisplayName = currentUserMember ?
                    (currentUserMember.display_name || currentUserMember.full_name || currentUserDisplayName) :
                    currentUserDisplayName;

                console.log('🔍 Filtering "My Milestones" for owner:', userDisplayName);
                filtered = filtered.filter(m => {
                    console.log('  Milestone owner:', m.owner, '- Match:', m.owner === userDisplayName);
                    return m.owner === userDisplayName;
                });
            }

            // Apply goal filter
            if (goalFilter !== 'all') {
                console.log('🔍 Filtering by goal:', goalFilter);
                filtered = filtered.filter(m => m.goal_id === goalFilter);
            }

            console.log('✅ Filtered milestones:', filtered.length, 'of', allMilestones.length);

            if (filtered.length === 0) {
                console.log('⚠️ No milestones after filtering, showing empty state');
                showEmptyState();
            } else {
                console.log('✅ Rendering', filtered.length, 'milestones');
                renderMilestones(filtered);
            }
        };

        // Render Milestones grouped by Goal
        function renderMilestones(milestones) {
            console.log('🎨 renderMilestones called with', milestones.length, 'milestones');
            console.log('📁 Available goals:', allGoals.length);

            if (!milestones || milestones.length === 0) {
                console.log('⚠️ No milestones to render, showing empty state');
                showEmptyState();
                return;
            }

            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('milestonesContainer').style.display = 'block';

            // Group milestones by goal
            const groupedByGoal = {};

            milestones.forEach(milestone => {
                const goalId = milestone.goal_id || 'no-goal';
                if (!groupedByGoal[goalId]) {
                    groupedByGoal[goalId] = [];
                }
                groupedByGoal[goalId].push(milestone);
            });

            console.log('📦 Grouped by goal:', Object.keys(groupedByGoal).length, 'groups');

            const container = document.getElementById('milestonesContainer');
            container.innerHTML = '';

            // Render each group
            Object.keys(groupedByGoal).forEach(goalId => {
                const milestonesInGroup = groupedByGoal[goalId];
                const goal = allGoals.find(g => g.id === goalId);
                const goalTitle = goal ? goal.title : (goalId === 'no-goal' ? 'No Goal' : 'Unknown Goal');

                console.log(`  Group "${goalTitle}": ${milestonesInGroup.length} milestones`);

                const groupHtml = `
                    <div class="milestone-group">
                        <div class="group-header">
                            <h2 ${goal ? `onclick="window.location.href='goal-detail.html?id=${goalId}'" style="cursor: pointer;"` : ''}>${escapeHtml(goalTitle)}</h2>
                            <span class="milestone-count-badge">${milestonesInGroup.length} milestone${milestonesInGroup.length !== 1 ? 's' : ''}</span>
                        </div>
                        ${milestonesInGroup.map(milestone => renderMilestoneCard(milestone)).join('')}
                    </div>
                `;
                container.innerHTML += groupHtml;
            });

            console.log('✅ Render complete. Container HTML length:', container.innerHTML.length);
        }

        function renderMilestoneCard(milestone) {
            const statusClass = milestone.status.toLowerCase().replace('_', '-');
            const statusText = milestone.status.replace('_', ' ');

            return `
                <div class="milestone-item" onclick="viewMilestone('${milestone.id}')">
                    <div class="milestone-icon ${statusClass}">◉</div>
                    <div class="milestone-content">
                        <h3>${escapeHtml(milestone.title)}</h3>
                        <p>${escapeHtml(milestone.description || 'No description')}</p>
                        <div class="milestone-meta">
                            <span class="meta-item">📅 Due: ${formatDate(milestone.due_date)}</span>
                        </div>
                        <div class="progress-section">
                            <div class="progress-bar-horizontal">
                                <div class="progress-fill-horizontal" style="width: ${milestone.progress || 0}%"></div>
                            </div>
                            <span class="progress-percent">${milestone.progress || 0}%</span>
                        </div>
                    </div>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
            `;
        }

        // Open Add Milestone Modal
        window.openAddMilestoneModal = function () {
            currentMilestoneId = null;
            document.getElementById('modalTitle').textContent = 'New Milestone';
            document.getElementById('submitBtnText').textContent = 'Create Milestone';
            document.getElementById('milestoneForm').reset();

            // Check if we came from a goal (URL parameter)
            const urlParams = new URLSearchParams(window.location.search);
            const goalId = urlParams.get('goal');
            if (goalId) {
                document.getElementById('milestoneGoal').value = goalId;
            }

            document.getElementById('milestoneModal').style.display = 'flex';
        };

        // Close Modal
        window.closeMilestoneModal = function () {
            document.getElementById('milestoneModal').style.display = 'none';
        };

        // Helper function to update goal milestone count
        async function updateGoalMilestoneCount(goalId) {
            try {
                // Count actual milestones for this goal
                const milestones = await supabase.select('milestones', { goal_id: goalId });
                const actualCount = milestones?.length || 0;

                // Update the goal's milestone_count field
                await supabase.update('goals', goalId, { milestone_count: actualCount });

                console.log(`✅ Updated goal ${goalId} milestone count to ${actualCount}`);
            } catch (error) {
                console.error('Error updating goal milestone count:', error);
            }
        }

        // Handle Form Submit
        window.handleMilestoneSubmit = async function (event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const submitBtnText = document.getElementById('submitBtnText');
            const submitBtnLoader = document.getElementById('submitBtnLoader');

            submitBtn.disabled = true;
            submitBtnText.style.display = 'none';
            submitBtnLoader.style.display = 'inline-block';

            try {
                const formData = new FormData(event.target);
                const milestoneData = {
                    title: formData.get('title'),
                    description: formData.get('description') || '',
                    goal_id: formData.get('goal_id'),
                    owner: formData.get('owner'),
                    user_id: currentUser.id,
                    due_date: formData.get('due_date'),
                    status: formData.get('status'),
                    progress: parseInt(formData.get('progress')) || 0
                };

                if (currentMilestoneId) {
                    // Update existing milestone
                    await supabase.update('milestones', currentMilestoneId, milestoneData);
                    showToast('Milestone updated successfully', 'success');
                } else {
                    // Create new milestone
                    await supabase.insert('milestones', milestoneData);
                    showToast('Milestone created successfully', 'success');

                    // Update the goal's milestone count
                    if (milestoneData.goal_id) {
                        await updateGoalMilestoneCount(milestoneData.goal_id);
                    }
                }

                closeMilestoneModal();
                // Reload in correct order: goals first, then milestones
                await loadGoals(); // Refresh goal list (for counts and new goals)
                await loadMilestones(); // This will trigger filterMilestones()
            } catch (error) {
                console.error('Error saving milestone:', error);
                showToast('Failed to save milestone', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtnText.style.display = 'inline';
                submitBtnLoader.style.display = 'none';
            }
        };

        // View Milestone Detail
        window.viewMilestone = function (milestoneId) {
            window.location.href = `milestone-detail.html?id=${milestoneId}`;
        };

        // Utility Functions
        function showLoading(show) {
            if (show) {
                // Show loading, hide everything else
                document.getElementById('loadingState').style.display = 'flex';
                document.getElementById('milestonesContainer').style.display = 'none';
                document.getElementById('emptyState').style.display = 'none';
            } else {
                // Just hide loading spinner - don't touch other elements
                // Let renderMilestones() or showEmptyState() control visibility
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        function showEmptyState() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('milestonesContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'flex';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 100);

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Logout
        window.logout = function () {
            supabase.signOut();
            window.location.href = '../auth/login.html';
        };

        // Close modal on outside click
        window.onclick = function (event) {
            const modal = document.getElementById('milestoneModal');
            if (event.target === modal) {
                closeMilestoneModal();
            }
        };

    </script>


</body>

</html>
